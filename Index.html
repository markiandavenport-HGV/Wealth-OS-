<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthOS</title>
  <style>
    :root{
      --bg:#040b2a;
      --panel:#0b153d;
      --border:rgba(255,255,255,.08);
      --text:#f3f6ff;
      --muted:#8f9ab9;
      --green:#33e0a1;
      --pink:#ff648c;
      --blue:#5b9dff;
      --orange:#f7aa19;
      --purple:#9966ff;
      --teal:#17d4a7;
      --shadow:0 14px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top left, rgba(31,56,140,.24), transparent 28%),
        radial-gradient(circle at top right, rgba(0,255,180,.06), transparent 20%),
        linear-gradient(180deg,#030821 0%, #030a27 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{min-height:100vh}

    .app{
      width:100%;
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      background:transparent;
    }

    .brand{
      padding:16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .brand-left{
      display:flex;gap:14px;align-items:center;
    }
    .brand-icon{
      width:54px;height:54px;border-radius:16px;
      background:linear-gradient(135deg,#29d48c,#1cc8b2);
      display:grid;place-items:center;
      font-size:28px;font-weight:800;
      box-shadow:var(--shadow);
    }
    .brand-title{
      font-size:24px;
      font-weight:800;
      line-height:1.1;
    }
    .brand-sub{
      color:#7f8cb3;
      font-size:14px;
      margin-top:4px;
      letter-spacing:.2px;
    }
    .menu-btn{
      background:transparent;border:0;color:#d3dbff;
      font-size:30px;cursor:pointer;padding:4px 8px;border-radius:12px;
    }

    .side-menu{
      display:none;
      padding:10px 16px 20px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .side-menu.open{display:block}
    .nav-list{display:grid;gap:14px}
    .nav-item{
      width:100%;
      border:0;
      color:#bfc8ea;
      background:transparent;
      border-radius:18px;
      padding:16px 18px;
      text-align:left;
      font-size:18px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .nav-item.active{
      color:#55e6af;
      background:linear-gradient(90deg, rgba(17,212,143,.16), rgba(17,212,143,.06));
      box-shadow:inset 0 0 0 1px rgba(61,228,165,.08);
    }

    .content{
      padding:18px 16px 96px;
    }
    .page{display:none}
    .page.active{display:block}

    h1{
      margin:10px 0 8px;
      font-size:30px;
      line-height:1.1;
    }
    .subtext{
      color:var(--muted);
      font-size:16px;
      margin-bottom:18px;
    }

    .month-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:10px 0 22px;
      flex-wrap:wrap;
    }
    .month-picker{
      display:flex;
      align-items:center;
      gap:16px;
      font-size:20px;
      font-weight:700;
    }
    .month-nav{
      background:transparent;
      border:0;
      color:#dbe3ff;
      font-size:30px;
      cursor:pointer;
      line-height:1;
      padding:4px 6px;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-weight:700;
      font-size:18px;
      cursor:pointer;
    }
    .btn-add{background:#f59b10;color:#fff;min-width:140px}
    .btn-green{background:#16b67d;color:#fff}
    .btn-red{background:#ea2a57;color:#fff}
    .btn-export{background:#f1f3f7;color:#8c95aa;border:2px solid #c9cfdb;padding:12px 16px}
    .btn-small{
      padding:8px 12px;
      border-radius:10px;
      font-size:13px;
      color:#fff;
      margin-right:6px;
      margin-bottom:6px;
    }
    .btn-edit{background:#345dff}
    .btn-delete{background:#a61f3f}

    .currency-select{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px 14px;
      font-size:16px;
    }
    .currency-select option{
      color:#111;
    }

    .stat-grid{
      display:grid;
      gap:16px;
    }
    .card{
      border-radius:28px;
      padding:24px;
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }
    .stat-card{
      position:relative;
      overflow:hidden;
      min-height:150px;
    }
    .stat-card:before{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.05), transparent 55%);
      pointer-events:none;
    }
    .stat-label{
      color:#b8c1de;
      letter-spacing:3px;
      font-size:14px;
      margin-bottom:16px;
    }
    .stat-value{
      font-size:34px;
      font-weight:900;
      line-height:1;
      margin-bottom:10px;
    }
    .stat-note{
      color:var(--muted);
      font-size:15px;
    }
    .stat-icon{
      position:absolute;
      right:22px;
      top:22px;
      width:58px;height:58px;
      border-radius:18px;
      display:grid;place-items:center;
      font-size:28px;font-weight:800;
      background:rgba(255,255,255,.06);
      color:#fff;
    }
    .income-card{background:linear-gradient(135deg, rgba(24,179,117,.28), rgba(6,18,61,.88))}
    .liability-card{background:linear-gradient(135deg, rgba(155,28,79,.35), rgba(6,18,61,.88))}
    .cashflow-card{background:linear-gradient(135deg, rgba(31,104,255,.27), rgba(6,18,61,.88))}
    .asset-card{background:linear-gradient(135deg, rgba(154,91,9,.30), rgba(6,18,61,.88))}

    .section{
      margin-top:18px;
    }
    .section-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .section-title{
      font-size:22px;
      font-weight:800;
      margin:0;
    }
    .section-sub{
      color:var(--muted);
      margin-top:4px;
      font-size:14px;
    }

    .table-wrap{
      overflow:auto;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.02);
      box-shadow:var(--shadow);
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:860px;
    }
    th,td{
      padding:18px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
      vertical-align:top;
    }
    th{
      color:#8893b7;
      font-size:13px;
      font-weight:800;
      letter-spacing:3px;
      white-space:nowrap;
    }
    td{
      font-size:16px;
      color:#eef3ff;
    }
    tr:last-child td{border-bottom:0}

    .amount-income{color:var(--green);font-weight:800}
    .amount-liability{color:var(--pink);font-weight:800}
    .amount-asset{color:#ffc53d;font-weight:800}

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 14px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      border:1px solid rgba(255,255,255,.1);
      white-space:nowrap;
    }
    .pill.salary{color:#52f0b5;background:rgba(20,172,123,.12);border-color:rgba(20,172,123,.28)}
    .pill.freelance{color:#60a9ff;background:rgba(43,111,255,.12);border-color:rgba(43,111,255,.28)}
    .pill.dividends{color:#ffcb43;background:rgba(255,178,20,.12);border-color:rgba(255,178,20,.28)}
    .pill.rental{color:#ba83ff;background:rgba(153,102,255,.12);border-color:rgba(153,102,255,.28)}
    .pill.rent{color:#ff6e9d;background:rgba(255,76,125,.12);border-color:rgba(255,76,125,.28)}
    .pill.loanpayment{color:#ff9d59;background:rgba(255,125,49,.12);border-color:rgba(255,125,49,.28)}
    .pill.insurance{color:#45ceff;background:rgba(31,156,255,.12);border-color:rgba(31,156,255,.28)}
    .pill.utilities{color:#ffcf4f;background:rgba(250,196,40,.12);border-color:rgba(250,196,40,.28)}
    .pill.subscriptions{color:#c27aff;background:rgba(169,93,255,.12);border-color:rgba(169,93,255,.28)}
    .pill.food{color:#9ce34d;background:rgba(123,208,43,.12);border-color:rgba(123,208,43,.28)}
    .pill.gold{color:#ffbf3f;background:rgba(255,177,30,.12);border-color:rgba(255,177,30,.28)}
    .pill.equities{
